<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souls Style Loot — Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "EB Garamond", "Times New Roman", Georgia, serif;
            background: linear-gradient(180deg, #1a1510 0%, #0d0a08 100%);
            min-height: 100vh;
            color: #fff;
            user-select: none;
            pointer-events: none;
        }
        #loot-panel {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            min-width: 280px;
            max-width: 360px;
            opacity: 0;
            transition: opacity 0.22s ease;
            pointer-events: auto;
        }
        #loot-panel.visible { opacity: 1; }
        .panel-frame {
            /* Dark charcoal to match reference: very dark desaturated gray, marginally lighter top-left, darker bottom-right, subtle depth */
            background-color: #141414;
            background-image:
                radial-gradient(ellipse 110% 75% at 22% 28%, rgba(31, 31, 31, 0.12) 0%, transparent 48%),
                linear-gradient(152deg, #1a1a1a 0%, #161616 28%, #121212 55%, #0d0d0d 82%, #0a0a0a 100%);
            background-blend-mode: normal;
            /* Double-line border: outer thin faded line, inner prominent tarnished gold */
            border: 1px solid rgba(190, 178, 145, 0.6);
            box-shadow:
                inset 0 0 0 1px rgba(168, 148, 100, 0.92),
                0 0 14px rgba(168, 148, 100, 0.06);
            padding: 16px 20px 12px;
            width: 100%;
            position: relative;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        /* Corner L-shaped flourishes – slightly brighter than border for emphasis */
        .panel-frame::before,
        .panel-frame::after {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: rgba(182, 165, 120, 0.95);
            border-style: solid;
            border-width: 0;
            box-shadow: 0 0 8px rgba(168, 148, 100, 0.15);
        }
        .panel-frame::before {
            top: -1px;
            left: -1px;
            border-top-width: 2px;
            border-left-width: 2px;
        }
        .panel-frame::after {
            top: -1px;
            right: -1px;
            border-top-width: 2px;
            border-right-width: 2px;
        }
        .panel-frame .corner-bot-left,
        .panel-frame .corner-bot-right {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: rgba(182, 165, 120, 0.95);
            border-style: solid;
            border-width: 0;
            bottom: -1px;
            box-shadow: 0 0 8px rgba(168, 148, 100, 0.15);
        }
        .panel-frame .corner-bot-left {
            left: -1px;
            border-bottom-width: 2px;
            border-left-width: 2px;
        }
        .panel-frame .corner-bot-right {
            right: -1px;
            border-bottom-width: 2px;
            border-right-width: 2px;
        }
        .panel-frame.cycle-active {
            animation: panelCycle 0.4s ease;
        }
        @keyframes panelCycle {
            0% { transform: scale(1); box-shadow: inset 0 0 0 1px rgba(168, 148, 100, 0.92), 0 0 14px rgba(168, 148, 100, 0.06); }
            50% { transform: scale(1.02); box-shadow: inset 0 0 0 1px rgba(168, 148, 100, 0.98), 0 0 20px rgba(168, 148, 100, 0.12); }
            100% { transform: scale(1); box-shadow: inset 0 0 0 1px rgba(168, 148, 100, 0.92), 0 0 14px rgba(168, 148, 100, 0.06); }
        }
        .item-content { }
        .item-rarity {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
            min-height: 1.2em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }
        .item-rarity.rarity-common { color: #9ca3af; }
        .item-rarity.rarity-uncommon { color: #4ade80; }
        .item-rarity.rarity-rare { color: #60a5fa; }
        .item-rarity.rarity-epic { color: #c084fc; }
        .item-rarity.rarity-legendary { color: #fbbf24; }
        .item-name {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
            margin-bottom: 12px;
            min-height: 1.4em;
            padding: 0 8px 10px;
            border-bottom: 1px solid rgba(184, 180, 168, 0.85);
        }
        .item-visual {
            width: 100%;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #8a8680;
            font-size: 13px;
            overflow: hidden;
        }
        .item-visual img {
            max-width: 100%;
            max-height: 100px;
            object-fit: contain;
        }
        .item-count {
            font-size: 18px;
            font-weight: 600;
            color: #e8e4dc;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }
        .prompt-bar {
            text-align: center;
            padding: 8px 0 4px;
            border-top: 1px solid #6a6660;
            font-size: 13px;
            color: #c9c4b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .prompt-bar .key-cap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 24px;
            padding: 0 6px;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(220, 218, 212, 0.9);
            font-size: 13px;
            font-weight: 600;
            color: #e8e4dc;
            font-family: inherit;
            margin-right: 4px;
        }
        .prompt-bar .action-text {
            font-size: 13px;
            font-weight: 500;
            color: #c9c4b8;
            letter-spacing: 0.02em;
        }
        #loot-prompt { display: contents; }
    </style>
</head>
<body>
    <div id="loot-panel">
        <div class="panel-frame">
            <span class="corner-bot-left" aria-hidden="true"></span>
            <span class="corner-bot-right" aria-hidden="true"></span>
            <div class="item-content" id="loot-item-content">
                <div class="item-rarity" id="loot-item-rarity"></div>
                <div class="item-name" id="loot-item-name">—</div>
                <div class="item-visual" id="loot-item-visual"></div>
            </div>
            <div class="prompt-bar" id="loot-prompt-wrap" style="display: none;">
                <div id="loot-prompt"><span class="key-cap">E</span><span class="action-text">: OK</span></div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            var PANEL_ID = 'loot-panel';
            var CONTENT_ID = 'loot-item-content';
            var RARITY_ID = 'loot-item-rarity';
            var NAME_ID = 'loot-item-name';
            var VISUAL_ID = 'loot-item-visual';
            var PROMPT_ID = 'loot-prompt';
            var PROMPT_WRAP_ID = 'loot-prompt-wrap';
            var FADE_MS = 220;
            var CYCLE_DELAY_MS = 2000;

            var DEFAULT_ICON = 'assets/misc/misc1.png';

            function escapeHtml(text) {
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            function normalizeIconPath(p) {
                if (!p) return '';
                var s = String(p);
                s = s.replace(/\\/g, '/');
                if (s.indexOf('SoulsStyleLoot/') === 0) s = s.substring('SoulsStyleLoot/'.length);
                return s;
            }

            var RARITY_LABELS = { common: 'Common', uncommon: 'Uncommon', rare: 'Rare', epic: 'Epic', legendary: 'Legendary' };
            var MOCK_ITEMS = [
                { name: 'Steel Sword', rarity: 'common', iconPath: 'assets/weapons/sword.png', count: 1 },
                { name: 'Orcish War Axe', rarity: 'uncommon', iconPath: 'assets/weapons/waraxe.png', count: 1 },
                { name: 'Ebony Greatsword', rarity: 'rare', iconPath: 'assets/weapons/greatsword.png', count: 1 },
                { name: 'Hunting Bow', rarity: 'common', iconPath: 'assets/weapons/bow.png', count: 1 },
                { name: 'Steel Arrow', rarity: 'common', iconPath: 'assets/weapons/arrows.png', count: 24 },
                { name: 'Dwarven Bolt', rarity: 'uncommon', iconPath: 'assets/weapons/bolts.png', count: 15 },
                { name: 'Iron Dagger', rarity: 'common', iconPath: 'assets/weapons/dagger.png', count: 1 },
                { name: 'Nord Hero Battleaxe', rarity: 'legendary', iconPath: 'assets/weapons/battleaxe.png', count: 1 },
                { name: 'Staff of Firebolts', rarity: 'rare', iconPath: 'assets/weapons/staff.png', count: 1 },
                { name: 'Nord Mail Cuirass', rarity: 'uncommon', iconPath: 'assets/armors/cuirass_light.png', count: 1 },
                { name: 'Daedric Helm', rarity: 'legendary', iconPath: 'assets/armors/headgear_heavy.png', count: 1 },
                { name: 'Hide Boots', rarity: 'common', iconPath: 'assets/armors/boots_light.png', count: 1 },
                { name: 'Tower Shield', rarity: 'rare', iconPath: 'assets/armors/greatshield_heavy.png', count: 1 },
                { name: 'Farm Clothes', rarity: 'common', iconPath: 'assets/clothing/clothing.png', count: 1 },
                { name: 'Novice Robes', rarity: 'common', iconPath: 'assets/clothing/robe.png', count: 1 },
                { name: 'Leather Gloves', rarity: 'common', iconPath: 'assets/clothing/gloves.png', count: 1 },
                { name: 'Silver Ring', rarity: 'rare', iconPath: 'assets/jewelry/ring.png', count: 1 },
                { name: 'Amulet of Mara', rarity: 'epic', iconPath: 'assets/jewelry/amulet.png', count: 1 },
                { name: 'Flames Spell Tome', rarity: 'common', iconPath: 'assets/books/magic_destruction.png', count: 1 },
                { name: 'Healing Spell Tome', rarity: 'uncommon', iconPath: 'assets/books/magic_restoration.png', count: 1 },
                { name: 'Bounty Letter', rarity: 'common', iconPath: 'assets/misc/notes.png', count: 1 },
                { name: 'Treasure Map', rarity: 'uncommon', iconPath: 'assets/misc/treasure_map.png', count: 1 },
                { name: 'Dungeon Key', rarity: 'common', iconPath: 'assets/misc/key.png', count: 1 },
                { name: 'Lockpick', rarity: 'common', iconPath: 'assets/misc/lockpick.png', count: 12 },
                { name: 'Iron Ingot', rarity: 'common', iconPath: 'assets/misc/ingot.png', count: 5 },
                { name: 'Silver Ore', rarity: 'uncommon', iconPath: 'assets/misc/ore.png', count: 3 },
                { name: 'Traveler\'s Backpack', rarity: 'uncommon', iconPath: 'assets/misc/backpack.png', count: 1 },
                { name: 'Health Potion', rarity: 'uncommon', iconPath: 'assets/ingestable/potion_health.png', count: 5 },
                { name: 'Magicka Potion', rarity: 'uncommon', iconPath: 'assets/ingestable/potion_magicka.png', count: 3 },
                { name: 'Venison Chop', rarity: 'common', iconPath: 'assets/ingestable/meat.png', count: 2 },
                { name: 'Apple', rarity: 'common', iconPath: 'assets/ingestable/fruit.png', count: 8 },
                { name: 'Cabbage', rarity: 'common', iconPath: 'assets/ingestable/vegetable.png', count: 4 },
                { name: 'Snowberries', rarity: 'common', iconPath: 'assets/alchemy/flower.png', count: 12 },
                { name: 'Bone Meal', rarity: 'common', iconPath: 'assets/alchemy/bone.png', count: 6 },
                { name: 'Blue Butterfly Wing', rarity: 'uncommon', iconPath: 'assets/alchemy/bug.png', count: 4 },
                { name: 'Fly Amanita', rarity: 'common', iconPath: 'assets/alchemy/mushroom.png', count: 7 },
                { name: 'Human Heart', rarity: 'rare', iconPath: 'assets/alchemy/organ.png', count: 1 }
            ];

            var PANEL_FRAME_CLASS = 'panel-frame';
            var CYCLE_ACTIVE_CLASS = 'cycle-active';

            function showItem(index) {
                var panel = document.getElementById(PANEL_ID);
                var contentEl = document.getElementById(CONTENT_ID);
                var rarityEl = document.getElementById(RARITY_ID);
                var nameEl = document.getElementById(NAME_ID);
                var visualEl = document.getElementById(VISUAL_ID);
                var promptWrap = document.getElementById(PROMPT_WRAP_ID);
                if (!panel || !contentEl || !rarityEl || !nameEl || !visualEl || !promptWrap) return;

                var item = MOCK_ITEMS[index];
                nameEl.textContent = item.name;
                var src = normalizeIconPath(item.iconPath) || DEFAULT_ICON;
                var n = (item.count != null && item.count > 0) ? Math.floor(Number(item.count)) : 1;
                visualEl.innerHTML = '<img src="' + escapeHtml(src) + '" alt="">' +
                    '<span class="item-count">' + escapeHtml('×' + n) + '</span>';

                var key = (item.rarity && String(item.rarity).trim()) ? String(item.rarity).toLowerCase() : 'common';
                if (!RARITY_LABELS[key]) key = 'common';
                rarityEl.textContent = RARITY_LABELS[key];
                rarityEl.className = 'item-rarity rarity-' + key;

                var isLast = index === MOCK_ITEMS.length - 1;
                promptWrap.style.display = isLast ? 'flex' : 'none';

                panel.classList.add('visible');

                var panelFrame = contentEl.closest('.' + PANEL_FRAME_CLASS);
                if (panelFrame) {
                    panelFrame.classList.remove(CYCLE_ACTIVE_CLASS);
                    void panelFrame.offsetWidth;
                    panelFrame.classList.add(CYCLE_ACTIVE_CLASS);
                    setTimeout(function() {
                        panelFrame.classList.remove(CYCLE_ACTIVE_CLASS);
                    }, 400);
                }
            }

            function advanceCycle() {
                window._mockIndex = (window._mockIndex === undefined ? -1 : window._mockIndex) + 1;
                var current = window._mockIndex;

                if (current >= MOCK_ITEMS.length) {
                    showItem(MOCK_ITEMS.length - 1);
                    return;
                }

                var panel = document.getElementById(PANEL_ID);
                if (panel) panel.classList.remove('visible');

                setTimeout(function() {
                    showItem(current);
                    if (current < MOCK_ITEMS.length - 1) {
                        window._cycleTimer = setTimeout(advanceCycle, CYCLE_DELAY_MS);
                    }
                }, FADE_MS);
            }

            showItem(0);
            window._mockIndex = 0;
            window._cycleTimer = setTimeout(advanceCycle, CYCLE_DELAY_MS);
        })();
    </script>
</body>
</html>
