<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souls Style Loot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "EB Garamond", "Times New Roman", Georgia, serif;
            background: transparent;
            min-height: 100vh;
            color: #fff;
            user-select: none;
            pointer-events: none;
        }
        #loot-panel {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            min-width: 280px;
            max-width: 360px;
            opacity: 0;
            transition: opacity 0.22s ease;
            pointer-events: auto;
        }
        #loot-panel.visible { opacity: 1; }
        .panel-frame {
            /* Dark charcoal to match reference: very dark desaturated gray, marginally lighter top-left, darker bottom-right, subtle depth */
            background-color: #141414;
            background-image:
                radial-gradient(ellipse 110% 75% at 22% 28%, rgba(31, 31, 31, 0.12) 0%, transparent 48%),
                linear-gradient(152deg, #1a1a1a 0%, #161616 28%, #121212 55%, #0d0d0d 82%, #0a0a0a 100%);
            background-blend-mode: normal;
            /* Double-line border: outer thin faded line, inner prominent tarnished gold */
            border: 1px solid rgba(190, 178, 145, 0.6);
            box-shadow:
                inset 0 0 0 1px rgba(168, 148, 100, 0.92),
                0 0 14px rgba(168, 148, 100, 0.06);
            padding: 16px 20px 12px;
            width: 100%;
            position: relative;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        /* Corner L-shaped flourishes – slightly brighter than border for emphasis */
        .panel-frame::before,
        .panel-frame::after {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: rgba(182, 165, 120, 0.95);
            border-style: solid;
            border-width: 0;
            box-shadow: 0 0 8px rgba(168, 148, 100, 0.15);
        }
        .panel-frame::before {
            top: -1px;
            left: -1px;
            border-top-width: 2px;
            border-left-width: 2px;
        }
        .panel-frame::after {
            top: -1px;
            right: -1px;
            border-top-width: 2px;
            border-right-width: 2px;
        }
        .panel-frame .corner-bot-left,
        .panel-frame .corner-bot-right {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: rgba(182, 165, 120, 0.95);
            border-style: solid;
            border-width: 0;
            bottom: -1px;
            box-shadow: 0 0 8px rgba(168, 148, 100, 0.15);
        }
        .panel-frame .corner-bot-left {
            left: -1px;
            border-bottom-width: 2px;
            border-left-width: 2px;
        }
        .panel-frame .corner-bot-right {
            right: -1px;
            border-bottom-width: 2px;
            border-right-width: 2px;
        }
        .panel-frame.cycle-active {
            animation: panelCycle 0.4s ease;
        }
        @keyframes panelCycle {
            0% { transform: scale(1); box-shadow: inset 0 0 0 1px rgba(168, 148, 100, 0.92), 0 0 14px rgba(168, 148, 100, 0.06); }
            50% { transform: scale(1.02); box-shadow: inset 0 0 0 1px rgba(168, 148, 100, 0.98), 0 0 20px rgba(168, 148, 100, 0.12); }
            100% { transform: scale(1); box-shadow: inset 0 0 0 1px rgba(168, 148, 100, 0.92), 0 0 14px rgba(168, 148, 100, 0.06); }
        }
        .item-content { }
        .item-rarity {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
            min-height: 1.2em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }
        .item-rarity.rarity-common { color: #9ca3af; }
        .item-rarity.rarity-uncommon { color: #4ade80; }
        .item-rarity.rarity-rare { color: #60a5fa; }
        .item-rarity.rarity-epic { color: #c084fc; }
        .item-rarity.rarity-legendary { color: #fbbf24; }
        .item-name {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
            margin-bottom: 12px;
            min-height: 1.4em;
            padding: 0 8px 10px;
            border-bottom: 1px solid rgba(184, 180, 168, 0.85);
        }
        .item-visual {
            width: 100%;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #8a8680;
            font-size: 13px;
            overflow: hidden;
        }
        .item-visual img {
            max-width: 100%;
            max-height: 100px;
            object-fit: contain;
        }
        .item-count {
            font-size: 18px;
            font-weight: 600;
            color: #e8e4dc;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }
        .prompt-bar {
            text-align: center;
            padding: 8px 0 4px;
            border-top: 1px solid #6a6660;
            font-size: 13px;
            color: #c9c4b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .prompt-bar .key-cap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 24px;
            padding: 0 6px;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(220, 218, 212, 0.9);
            font-size: 13px;
            font-weight: 600;
            color: #e8e4dc;
            font-family: inherit;
            margin-right: 4px;
        }
        .prompt-bar .action-text {
            font-size: 13px;
            font-weight: 500;
            color: #c9c4b8;
            letter-spacing: 0.02em;
        }
        #loot-prompt { display: contents; }
    </style>
</head>
<body>
    <div id="loot-panel">
        <div class="panel-frame">
            <span class="corner-bot-left" aria-hidden="true"></span>
            <span class="corner-bot-right" aria-hidden="true"></span>
            <div class="item-content" id="loot-item-content">
                <div class="item-rarity" id="loot-item-rarity"></div>
                <div class="item-name" id="loot-item-name">—</div>
                <div class="item-visual" id="loot-item-visual"></div>
            </div>
            <div class="prompt-bar" id="loot-prompt-wrap" style="display: none;">
                <div id="loot-prompt"></div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const PANEL_ID = 'loot-panel';
            const CONTENT_ID = 'loot-item-content';
            const RARITY_ID = 'loot-item-rarity';
            const NAME_ID = 'loot-item-name';
            const VISUAL_ID = 'loot-item-visual';
            const PROMPT_ID = 'loot-prompt';
            const PROMPT_WRAP_ID = 'loot-prompt-wrap';
            const FADE_MS = 220;
            const DEFAULT_CYCLE_MS = 2000;
            const PROMPTS = {
                keyboard: { key: 'E', action: ': OK' },
                controller: { key: 'A', action: ': OK' },
                controllerPs: { key: '▵', action: ': OK' }
            };
            var DEFAULT_ICON = 'assets/misc/misc1.png';
            let cycleTimer = null;
            let currentIndex = 0;
            let items = [];
            let cycleDelayMs = DEFAULT_CYCLE_MS;
            let requireActivateToClose = true;
            let promptType = 'keyboard';

            function getPromptHtml(pt) {
                var p = PROMPTS[pt] || PROMPTS.keyboard;
                return '<span class="key-cap">' + escapeHtml(p.key) + '</span><span class="action-text">' + escapeHtml(p.action) + '</span>';
            }
            function escapeHtml(text) {
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            function normalizeIconPath(p) {
                if (!p) return '';
                var s = String(p);
                s = s.replace(/\\/g, '/');
                // Our generator emits "SoulsStyleLoot/assets/..." but this file already lives under "SoulsStyleLoot/".
                if (s.indexOf('SoulsStyleLoot/') === 0) s = s.substring('SoulsStyleLoot/'.length);
                return s;
            }

            var RARITY_LABELS = { common: 'Common', uncommon: 'Uncommon', rare: 'Rare', epic: 'Epic', legendary: 'Legendary' };
            function setContent(name, iconPath, rarity, count) {
                var nameEl = document.getElementById(NAME_ID);
                var visualEl = document.getElementById(VISUAL_ID);
                var rarityEl = document.getElementById(RARITY_ID);
                if (nameEl) nameEl.textContent = name;
                if (visualEl) {
                    var src = normalizeIconPath(iconPath) || DEFAULT_ICON;
                    var n = (count != null && count > 0) ? Math.floor(Number(count)) : 1;
                    visualEl.innerHTML = '<img src="' + escapeHtml(src) + '" alt="">' +
                        '<span class="item-count">' + escapeHtml('×' + n) + '</span>';
                }
                if (rarityEl) {
                    var key = (rarity && String(rarity).trim()) ? String(rarity).toLowerCase() : 'common';
                    if (!RARITY_LABELS[key]) key = 'common';
                    rarityEl.textContent = RARITY_LABELS[key];
                    rarityEl.className = 'item-rarity rarity-' + key;
                }
            }

            var PANEL_FRAME_CLASS = 'panel-frame';
            var CYCLE_ACTIVE_CLASS = 'cycle-active';

            function showItem(index, skipFadeIn) {
                var contentEl = document.getElementById(CONTENT_ID);
                var panel = document.getElementById(PANEL_ID);
                var promptEl = document.getElementById(PROMPT_ID);
                var promptWrap = document.getElementById(PROMPT_WRAP_ID);
                if (!panel || !contentEl || !promptEl || !promptWrap) return;
                if (index < 0 || index >= items.length) return;

                var item = items[index];
                var name = (item && item.name) ? item.name : 'Item';
                var iconPath = (item && item.iconPath) ? String(item.iconPath) : '';
                var rarity = (item && item.rarity != null) ? String(item.rarity) : 'common';
                var count = (item && item.count != null) ? item.count : 1;

                setContent(name, iconPath, rarity, count);
                if (index === items.length - 1 && requireActivateToClose) {
                    promptEl.innerHTML = getPromptHtml(promptType);
                    promptWrap.style.display = 'flex';
                } else {
                    promptEl.innerHTML = '';
                    promptWrap.style.display = 'none';
                }
                panel.classList.add('visible');

                var panelFrame = contentEl.closest('.' + PANEL_FRAME_CLASS);
                if (panelFrame) {
                    panelFrame.classList.remove(CYCLE_ACTIVE_CLASS);
                    void panelFrame.offsetWidth;
                    panelFrame.classList.add(CYCLE_ACTIVE_CLASS);
                    setTimeout(function() {
                        panelFrame.classList.remove(CYCLE_ACTIVE_CLASS);
                    }, 400);
                }
            }

            function advanceCycle() {
                currentIndex++;
                if (currentIndex >= items.length) {
                    if (requireActivateToClose) {
                        // Already showing last item from previous step; only show prompt, no extra showItem (avoids duplicate pulse)
                        var promptEl = document.getElementById(PROMPT_ID);
                        if (promptEl) promptEl.innerHTML = getPromptHtml(promptType);
                        document.getElementById(PROMPT_WRAP_ID).style.display = 'flex';
                        if (typeof window.lootReadyForClose === 'function') window.lootReadyForClose('');
                    } else {
                        document.getElementById(PANEL_ID).classList.remove('visible');
                    }
                    return;
                }
                var panel = document.getElementById(PANEL_ID);
                if (panel) panel.classList.remove('visible');
                setTimeout(function() {
                    if (currentIndex >= items.length) return;
                    showItem(currentIndex, false);
                    cycleTimer = setTimeout(advanceCycle, cycleDelayMs);
                }, FADE_MS);
            }

            window.showLoot = function(jsonString) {
                var panel = document.getElementById(PANEL_ID);
                if (!panel) return;
                if (cycleTimer) { clearTimeout(cycleTimer); cycleTimer = null; }
                try {
                    var data = JSON.parse(jsonString);
                    items = (data && Array.isArray(data.items)) ? data.items : (Array.isArray(data) ? data : []);
                    cycleDelayMs = (data && typeof data.cycleDelayMs === 'number') ? Math.max(500, Math.min(10000, data.cycleDelayMs)) : DEFAULT_CYCLE_MS;
                    requireActivateToClose = !!(data && data.requireActivateToClose !== false);
                    promptType = (data && data.promptType) ? String(data.promptType) : 'keyboard';

                    if (items.length === 0) {
                        panel.classList.remove('visible');
                        document.getElementById(PROMPT_WRAP_ID).style.display = 'none';
                        return;
                    }

                    currentIndex = 0;
                    showItem(0, true);

                    if (items.length === 1 && requireActivateToClose) {
                        document.getElementById(PROMPT_ID).innerHTML = getPromptHtml(promptType);
                        document.getElementById(PROMPT_WRAP_ID).style.display = 'flex';
                        if (typeof window.lootReadyForClose === 'function') window.lootReadyForClose('');
                    } else if (items.length > 1) {
                        cycleTimer = setTimeout(advanceCycle, cycleDelayMs);
                    }
                } catch (e) {
                    console.error('showLoot:', e);
                    panel.classList.remove('visible');
                }
            };

            window.lootClosed = function() {
                if (cycleTimer) { clearTimeout(cycleTimer); cycleTimer = null; }
                var panel = document.getElementById(PANEL_ID);
                if (panel) panel.classList.remove('visible');
                var w = document.getElementById(PROMPT_WRAP_ID);
                if (w) w.style.display = 'none';
            };
        })();
    </script>
</body>
</html>
